[package]
name = "kotoba-storage-fcdb"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "FCDB storage adapter for Kotoba (Content-Addressable Storage with GraphDB)"
keywords = ["storage", "fcdb", "cas", "graphdb", "json-ld"]
categories = ["database", "storage"]

[dependencies]
# Kotoba storage interface
kotoba-storage = { path = "../031-kotoba-storage" }
kotoba-jsonld = { path = "../../010-logic/019-kotoba-jsonld" }

# fcdb crates (from git)
fcdb-core = { git = "https://github.com/com-junkawasaki/fcdb", default-features = false }
fcdb-cas = { git = "https://github.com/com-junkawasaki/fcdb", default-features = false }
fcdb-graph = { git = "https://github.com/com-junkawasaki/fcdb", default-features = false }

# JSON processing
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Async runtime
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Logging
tracing = "0.1"

# Path handling
tempfile = "3.0"

[dev-dependencies]
tokio-test = "0.4"

