[package]
name = "kotoba-phonosemantic"
version = "0.1.22"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Phonosemantic vocabulary mapping system for Kotoba"
keywords = ["phonosemantic", "phoneme", "vocabulary", "semantic-mapping", "json-ld"]
categories = ["web-programming", "algorithms", "data-structures"]
readme = "README.md"
documentation = "https://docs.rs/kotoba-phonosemantic"
homepage = "https://github.com/com-junkawasaki/kotoba"

[dependencies]
# Kotoba ecosystem
kotoba-jsonld = { path = "../019-kotoba-jsonld" }
kotoba-owl-reasoner = { path = "../022-kotoba-owl-reasoner", optional = true }

# JSON processing
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Async runtime
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"

# Logging
tracing = "0.1"

# Collections
indexmap = "2.0"

[features]
default = []
reasoning = ["kotoba-owl-reasoner"]

[dev-dependencies]
tokio-test = "0.4"

